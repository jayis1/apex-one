#   make driver CROSS_COMPILE=aarch64-linux-gnu-
#   make firmware PICO_SDK_PATH=/path/to/pico-sdk
# ============================================================================

# ── RK3576 (Linux Host) Toolchain ──────────────────────────────────────────
# Primary SoC: Rockchip RK3576 (ARM Cortex-A72 + Cortex-A53, aarch64)
GHOSTBLADE_AARCH64_CC="${GHOSTBLADE_AARCH64_CC:-aarch64-linux-gnu-gcc}"
GHOSTBLADE_AARCH64_CXX="${GHOSTBLADE_AARCH64_CXX:-aarch64-linux-gnu-g++}"
GHOSTBLADE_AARCH64_AR="${GHOSTBLADE_AARCH64_AR:-aarch64-linux-gnu-ar}"
GHOSTBLADE_AARCH64_STRIP="${GHOSTBLADE_AARCH64_STRIP:-aarch64-linux-gnu-strip}"
GHOSTBLADE_AARCH64_OBJDUMP="${GHOSTBLADE_AARCH64_OBJDUMP:-aarch64-linux-gnu-objdump}"
GHOSTBLADE_AARCH64_CROSS_COMPILE="${GHOSTBLADE_AARCH64_CROSS_COMPILE:-aarch64-linux-gnu-}"

# Kernel module cross-compilation
GHOSTBLADE_KERNEL_ARCH="${GHOSTBLADE_KERNEL_ARCH:-arm64}"
GHOSTBLADE_KERNEL_SRC="${GHOSTBLADE_KERNEL_SRC:-/usr/src/linux}"

# ── RP2350B (MCU Coprocessor) Toolchain ────────────────────────────────────
# Arm Cortex-M33 / Hazard3 RISC-V, bare-metal
GHOSTBLADE_ARM_CC="${GHOSTBLADE_ARM_CC:-arm-none-eabi-gcc}"
GHOSTBLADE_ARM_CXX="${GHOSTBLADE_ARM_CXX:-arm-none-eabi-g++}"
GHOSTBLADE_ARM_OBJDUMP="${GHOSTBLADE_ARM_OBJDUMP:-arm-none-eabi-objdump}"
GHOSTBLADE_ARM_SIZE="${GHOSTBLADE_ARM_SIZE:-arm-none-eabi-size}"
GHOSTBLADE_PICO_PLATFORM="${GHOSTBLADE_PICO_PLATFORM:-rp2350}"

# Pico SDK path (required for firmware build)
GHOSTBLADE_PICO_SDK_PATH="${GHOSTBLADE_PICO_SDK_PATH:-${HOME}/pico-sdk}"

# ── DTC (Device Tree Compiler) ─────────────────────────────────────────────
GHOSTBLADE_DTC="${GHOSTBLADE_DTC:-dtc}"
GHOSTBLADE_DTC_VERSION="$(dtc --version 2>/dev/null | head -1 || echo 'dtc not found')"

# ── Helper Functions ────────────────────────────────────────────────────────

ghostblade_check_toolchain() {
    echo "GhostBlade Cross-Compilation Toolchain Check"
    echo "=============================================="
    echo ""

    # Check aarch64 toolchain
    if command -v "${GHOSTBLADE_AARCH64_CC}" >/dev/null 2>&1; then
        echo "✓ aarch64 GCC: $(${GHOSTBLADE_AARCH64_CC} --version | head -1)"
    else
        echo "✗ aarch64 GCC not found. Install: sudo apt install gcc-aarch64-linux-gnu"
    fi

    # Check ARM bare-metal toolchain
    if command -v "${GHOSTBLADE_ARM_CC}" >/dev/null 2>&1; then
        echo "✓ ARM bare-metal GCC: $(${GHOSTBLADE_ARM_CC} --version | head -1)"
    else
        echo "✗ ARM bare-metal GCC not found. Install: sudo apt install gcc-arm-none-eabi"
    fi

    # Check Pico SDK
    if [ -d "${GHOSTBLADE_PICO_SDK_PATH}" ]; then
        echo "✓ Pico SDK: ${GHOSTBLADE_PICO_SDK_PATH}"
    else
        echo "✗ Pico SDK not found at ${GHOSTBLADE_PICO_SDK_PATH}"
        echo "  Clone: git clone https://github.com/raspberrypi/pico-sdk.git ${GHOSTBLADE_PICO_SDK_PATH}"
    fi

    # Check dtc
    if command -v "${GHOSTBLADE_DTC}" >/dev/null 2>&1; then
        echo "✓ DTC: ${GHOSTBLADE_DTC_VERSION}"
    else
        echo "✗ DTC not found. Install: sudo apt install device-tree-compiler"
    fi

    # Check kernel headers
    if [ -d "${GHOSTBLADE_KERNEL_SRC}" ]; then
        echo "✓ Kernel source: ${GHOSTBLADE_KERNEL_SRC}"
    else
        echo "✗ Kernel source not found at ${GHOSTBLADE_KERNEL_SRC}"
        echo "  Install: sudo apt install linux-headers-\$(uname -r)"
    fi

    echo ""
    echo "Set environment variables to override defaults:"
    echo "  GHOSTBLADE_AARCH64_CC     aarch64 cross-compiler (default: aarch64-linux-gnu-gcc)"
    echo "  GHOSTBLADE_ARM_CC        ARM bare-metal compiler (default: arm-none-eabi-gcc)"
    echo "  GHOSTBLADE_PICO_SDK_PATH Pico SDK path (default: ~/pico-sdk)"
    echo "  GHOSTBLADE_KERNEL_SRC    Kernel source path (default: /usr/src/linux)"
}

# Run toolchain check when sourced interactively
if [ -t 1 ]; then
    ghostblade_check_toolchain
fi